<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piedra Papel Tijera — Kiro Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    canvas { border: 2px solid #790ECB; border-radius: 8px; box-shadow: 0 0 30px rgba(121,14,203,0.3); max-height: 90vh; width: auto; }
    #webcam-container { position: fixed; bottom: 20px; right: 20px; width: 400px; height: 300px; border: 2px solid #790ECB; border-radius: 8px; overflow: hidden; box-shadow: 0 0 15px rgba(121,14,203,0.4); z-index: 10; }
    #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #hand-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    #hand-status { position: fixed; bottom: 325px; right: 20px; color: #c0c0c0; font-family: 'Segoe UI', sans-serif; font-size: 13px; text-align: center; width: 400px; z-index: 10; }
    #back-btn { position: fixed; top: 15px; left: 15px; background: rgba(121,14,203,0.3); color: #fff; border: 1px solid #790ECB; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; z-index: 10; }
    #back-btn:hover { background: rgba(121,14,203,0.6); }
  </style>
</head>
<body>
  <button id="back-btn">← Menu</button>
  <canvas id="game" width="800" height="1000"></canvas>
  <div id="webcam-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="hand-overlay"></canvas>
  </div>
  <div id="hand-status"></div>
  <script>
    // --- Audio Engine (Web Audio API) ---
    const KA = (() => {
      let ctx, started=false, bgmGain, masterGain, muted=false;
      function init() { if(started)return; started=true; ctx=new(window.AudioContext||window.webkitAudioContext)(); masterGain=ctx.createGain(); masterGain.gain.value=1; masterGain.connect(ctx.destination); bgmGain=ctx.createGain(); bgmGain.gain.value=0.18; bgmGain.connect(masterGain); }
      function tone(freq,dur,type='square',vol=0.07,dest) {
        if(!ctx)return; const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=type;o.frequency.value=freq;g.gain.value=vol;
        g.gain.setTargetAtTime(0,ctx.currentTime+dur*0.7,dur*0.15);
        o.connect(g);g.connect(dest||masterGain);o.start();o.stop(ctx.currentTime+dur);
      }
      function noise(dur,vol=0.04) {
        if(!ctx)return;const n=ctx.createBufferSource(),b=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=b.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);n.buffer=b;const g=ctx.createGain();g.gain.value=vol;
        g.gain.setTargetAtTime(0,ctx.currentTime+dur*0.5,dur*0.2);n.connect(g);g.connect(masterGain);n.start();n.stop(ctx.currentTime+dur);
      }
      let bgmInterval=null;
      function startBGM() {
        if(!ctx||bgmInterval)return;
        const notes=[349,392,440,523,494,440,392,349];let i=0;
        bgmInterval=setInterval(()=>{if(muted)return;tone(notes[i%notes.length],0.18,'square',0.05,bgmGain);tone(notes[i%notes.length]*0.5,0.18,'triangle',0.04,bgmGain);i++;},300);
      }
      function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}
      return {
        init, startBGM, stopBGM,
        jump(){init();tone(520,0.1,'square',0.06);tone(680,0.1,'square',0.04);},
        score(){init();tone(660,0.08,'square',0.06);setTimeout(()=>tone(880,0.12,'square',0.06),80);},
        hit(){init();noise(0.3,0.07);tone(150,0.3,'sawtooth',0.06);},
        countdown(){init();tone(440,0.12,'square',0.05);},
        go(){init();tone(660,0.1,'square',0.07);setTimeout(()=>tone(880,0.15,'square',0.07),100);},
        win(){init();[0,100,200,300].forEach((d,i)=>setTimeout(()=>tone([523,659,784,1047][i],0.2,'square',0.06),d));},
        lose(){init();tone(300,0.15,'sawtooth',0.06);setTimeout(()=>tone(200,0.3,'sawtooth',0.06),150);},
        select(){init();tone(600,0.08,'square',0.05);},
        slice(){init();noise(0.08,0.05);tone(800+Math.random()*400,0.06,'square',0.04);},
        tick(){init();tone(1000,0.03,'square',0.03);},
        toggle(){muted=!muted;if(masterGain)masterGain.gain.value=muted?0:1;return muted;}
      };
    })();
    document.addEventListener('click',()=>KA.init(),{once:true});
    document.addEventListener('keydown',()=>KA.init(),{once:true});

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // --- i18n ---
    let lang = localStorage.getItem('kiroArcadeLang') || 'es';
    const I18N = {
      es: {
        title: '✊ Piedra Papel Tijera ✌️',
        player: 'AWS',
        cpu: 'Kiro',
        round: 'Ronda',
        of: 'de',
        showGesture: 'Muestra ✊ ✋ o ✌️ a la cámara',
        startHint: 'ESPACIO o click para empezar',
        guide: '✊ Puño = Piedra  |  🖐️ Abierta = Papel  |  ✌️ 2 dedos = Tijera',
        win: '¡Ganaste! 🎉',
        lose: 'Perdiste 😢',
        draw: 'Empate 🤝',
        matchWin: '🏆 ¡AWS gana la partida!',
        matchLose: '😢 Kiro gana la partida',
        matchDraw: '🤝 ¡Empate en la partida!',
        holdBack: '✊ Mantén para volver...',
        rockLabel: '✊ Piedra',
        paperLabel: '🖐️ Papel',
        scissorsLabel: '✌️ Tijera',
        showHand: '👀 Muestra la mano',
        loadingModel: '🖐️ Cargando modelo...',
        noCam: '❌ Sin cámara',
        moduleFail: '❌ Fallo del módulo',
        modelFail: '❌ Fallo del modelo',
        ready: '🖐️ ¡Muestra un gesto!',
        getReady: 'Prepárate...',
        chooseNow: '¡Elige tu gesto!',
        playAgain: '🖐️ Mano abierta para jugar de nuevo',
        fistMenu: '✊ Puño para volver al menú',
        spaceRetry: 'ESPACIO / click para rejugar',
        ranking: '🏆 Top 5',
        pts: 'pts',
        noScores: 'Sin puntuaciones',
        winsLabel: 'victorias'
      },
      en: {
        title: '✊ Rock Paper Scissors ✌️',
        player: 'AWS',
        cpu: 'Kiro',
        round: 'Round',
        of: 'of',
        showGesture: 'Show ✊ ✋ or ✌️ to your camera',
        startHint: 'SPACE or click to start',
        guide: '✊ Fist = Rock  |  🖐️ Open = Paper  |  ✌️ 2 fingers = Scissors',
        win: 'You win! 🎉',
        lose: 'You lose 😢',
        draw: 'Draw 🤝',
        matchWin: '🏆 AWS wins the match!',
        matchLose: '😢 Kiro wins the match',
        matchDraw: '🤝 Match is a draw!',
        holdBack: '✊ Hold to go back...',
        rockLabel: '✊ Rock',
        paperLabel: '🖐️ Paper',
        scissorsLabel: '✌️ Scissors',
        showHand: '👀 Show hand',
        loadingModel: '🖐️ Loading model...',
        noCam: '❌ No camera',
        moduleFail: '❌ Module failed',
        modelFail: '❌ Model failed',
        ready: '🖐️ Show a gesture!',
        getReady: 'Get ready...',
        chooseNow: 'Choose your gesture!',
        playAgain: '🖐️ Open hand to play again',
        fistMenu: '✊ Fist to go back to menu',
        spaceRetry: 'SPACE / click to replay',
        ranking: '🏆 Top 5',
        pts: 'pts',
        noScores: 'No scores yet',
        winsLabel: 'wins'
      }
    };
    function t(k) { return (I18N[lang] || I18N.es)[k]; }

    // --- AI Comments System (Bedrock Nova) ---
    const aiComments = [];
    let lastCommentTime = 0;
    const COMMENT_INTERVAL = 4000;
    let commentFetching = false;

    // --- TTS Audio Queue (Polly) ---
    const ttsQueue = [];
    let ttsPlaying = false;

    function playNextTTS() {
      if (ttsPlaying || ttsQueue.length === 0) return;
      ttsPlaying = true;
      const b64 = ttsQueue.shift();
      try {
        const audio = new Audio('data:audio/mp3;base64,' + b64);
        audio.volume = 0.7;
        audio.onended = () => { ttsPlaying = false; playNextTTS(); };
        audio.onerror = () => { ttsPlaying = false; playNextTTS(); };
        audio.play().catch(() => { ttsPlaying = false; playNextTTS(); });
      } catch(e) { ttsPlaying = false; playNextTTS(); }
    }

    async function fetchTTS(text) {
      try {
        const resp = await fetch('/api/tts', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ text, lang }) });
        const data = await resp.json();
        if (data.audio) { ttsQueue.push(data.audio); playNextTTS(); }
      } catch(e) {}
    }

    async function fetchAIComment(event) {
      if (commentFetching) return;
      commentFetching = true;
      try {
        const resp = await fetch('/api/comment', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ game: 'rps', score: playerScore, event, lang }) });
        const data = await resp.json();
        if (data.comment) {
          aiComments.push({ text: data.comment, x: canvas.width + 10, y: 80 + Math.random() * 150, speed: 1.2 + Math.random() * 0.8, opacity: 1, color: ['#00ff88','#ffdd44','#ff69b4','#00ffff','#ff8800','#bb77ff'][Math.floor(Math.random()*6)], size: Math.floor(Math.random()*4) + 16 });
          fetchTTS(data.comment);
        }
      } catch(e) {}
      commentFetching = false;
    }

    function updateAIComments() {
      for (let i = aiComments.length - 1; i >= 0; i--) { aiComments[i].x -= aiComments[i].speed; if (aiComments[i].x < -500) aiComments.splice(i, 1); }
      while (aiComments.length > 6) aiComments.shift();
    }

    function drawAIComments() {
      for (const c of aiComments) {
        ctx.globalAlpha = 0.85; ctx.fillStyle = 'rgba(0,0,0,0.5)';
        const tw = ctx.measureText(c.text).width;
        ctx.beginPath(); ctx.roundRect(c.x - 6, c.y - c.size + 2, tw + 12, c.size + 8, 6); ctx.fill();
        ctx.fillStyle = c.color; ctx.font = `bold ${c.size}px "Segoe UI", sans-serif`; ctx.textAlign = 'left';
        ctx.fillText(c.text, c.x, c.y);
      }
      ctx.globalAlpha = 1; ctx.textAlign = 'center';
    }

    // --- AI Image System (Bedrock Nova Canvas) ---
    let aiImage = null;
    let aiImageLoading = false;
    let aiImageObj = null;

    // --- Camera Capture ---
    let cameraPhoto = null;
    let cameraStream = null;

    async function captureCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 512, height: 512, facingMode: 'user' } });
        cameraStream = stream;
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        await video.play();
        await new Promise(r => setTimeout(r, 500));
        const c = document.createElement('canvas');
        c.width = 512; c.height = 512;
        c.getContext('2d').drawImage(video, 0, 0, 512, 512);
        cameraPhoto = c.toDataURL('image/png').split(',')[1];
        stream.getTracks().forEach(t => t.stop());
        cameraStream = null;
        console.log('📸 Camera: foto capturada!');
        fetchAIImage();
      } catch(e) {
        console.log('📷 Camera not available, using text-to-image fallback');
        cameraPhoto = null;
      }
    }

    async function fetchAIImage() {
      if (aiImageLoading || aiImageObj) return;
      aiImageLoading = true;
      try {
        const payload = { game: 'rps', score: playerScore, lang };
        if (cameraPhoto) payload.photo = cameraPhoto;
        const resp = await fetch('/api/image', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        const data = await resp.json();
        if (data.image) { aiImage = 'data:image/png;base64,' + data.image; aiImageObj = new Image(); aiImageObj.src = aiImage; }
      } catch(e) {}
      aiImageLoading = false;
    }

    const MAX_ROUNDS = 5;
    const CHOICES = ['rock','paper','scissors'];
    const EMOJIS = {rock:'✊',paper:'🖐️',scissors:'✌️'};
    const RESULT_COLORS = {win:'#00ff88',lose:'#ff4444',draw:'#ffdd44'};

    // States: start | roundCountdown | playing | result | matchOver
    let gameState = 'start';
    let playerScore = 0, cpuScore = 0, round = 0;
    let playerChoice = null, cpuChoice = null, roundResult = null;
    let countdownValue = 3, countdownStart = 0;
    let playingStart = 0; // when the 5s choosing phase started
    const PLAY_DURATION = 5000; // 5s to choose
    let resultShowTime = 0;
    let matchOverTime = 0;
    const MATCHOVER_COOLDOWN = 3000;
    let detectedGesture = null;
    let fistHoldStart = 0;
    const FIST_BACK_MS = 3000;

    // Ranking
    function loadRanking(){try{const d=JSON.parse(localStorage.getItem('rpsRanking'));return Array.isArray(d)?d.slice(0,5):[];}catch(e){return[];}}
    function saveToRanking(wins){
      const name=(localStorage.getItem('kiroPlayerName')||'').trim()||'???';
      const date=new Date().toLocaleDateString();
      fetch('/api/ranking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'rps',score:wins,name,date})})
        .then(r=>r.json()).then(top5=>{lastRanking=top5;}).catch(()=>{});
      const r=loadRanking();r.push({score:wins,name,date});r.sort((a,b)=>b.score-a.score);const top5=r.slice(0,5);
      try{localStorage.setItem('rpsRanking',JSON.stringify(top5));}catch(e){}return top5;
    }
    function loadRankingFromServer(){fetch('/api/ranking?game=rps').then(r=>r.json()).then(d=>{if(Array.isArray(d)&&d.length>0)lastRanking=d;}).catch(()=>{});}
    let lastRanking = [];

    let _navigating = false;
    function goToMenu() {
      if (_navigating) return;
      _navigating = true;
      KA.stopBGM();
      try { const v=document.getElementById('webcam'); if(v&&v.srcObject){v.srcObject.getTracks().forEach(tr=>tr.stop());v.srcObject=null;} } catch(e){}
      setTimeout(() => { window.location.href = 'index.html'; }, 50);
    }
    document.getElementById('back-btn').addEventListener('click', goToMenu);

    function getResult(p, c) {
      if(p===c) return 'draw';
      if((p==='rock'&&c==='scissors')||(p==='paper'&&c==='rock')||(p==='scissors'&&c==='paper')) return 'win';
      return 'lose';
    }

    function resetMatch() {
      playerScore=0; cpuScore=0; round=0;
      playerChoice=null; cpuChoice=null; roundResult=null;
      aiComments.length = 0; ttsQueue.length = 0; ttsPlaying = false; lastCommentTime = Date.now();
      aiImage = null; aiImageObj = null; aiImageLoading = false;
    }

    function startMatch() {
      if(gameState==='start'||gameState==='matchOver') {
        if(gameState==='start') captureCamera(); // capture photo early
        resetMatch();
        beginRoundCountdown();
        KA.select(); KA.startBGM();
      }
    }

    function beginRoundCountdown() {
      round++;
      gameState='roundCountdown'; countdownValue=3; countdownStart=Date.now();
      playerChoice=null; cpuChoice=null; roundResult=null;
    }

    function beginPlaying() {
      gameState='playing'; playingStart=Date.now();
      KA.go();
    }

    function resolveRound() {
      playerChoice = detectedGesture || CHOICES[Math.floor(Math.random()*3)];
      cpuChoice = CHOICES[Math.floor(Math.random()*3)];
      roundResult = getResult(playerChoice, cpuChoice);
      if(roundResult==='win') { playerScore++; KA.win(); }
      if(roundResult==='lose') { cpuScore++; KA.lose(); }
      if(roundResult==='draw') KA.countdown();
      gameState='result'; resultShowTime=Date.now();
      fetchAIComment('round ' + round + ': player chose ' + playerChoice + ', kiro chose ' + cpuChoice + ', result: ' + roundResult);
    }

    function checkMatchEnd() {
      if(round >= MAX_ROUNDS) {
        lastRanking = saveToRanking(playerScore);
        gameState='matchOver'; matchOverTime=Date.now();
        KA.stopBGM();
        if(playerScore > cpuScore) { KA.win(); fetchAIComment('match over! player wins ' + playerScore + ' to ' + cpuScore); }
        else if(cpuScore > playerScore) { KA.lose(); fetchAIComment('match over! kiro wins ' + cpuScore + ' to ' + playerScore); }
        else fetchAIComment('match over! draw ' + playerScore + ' to ' + cpuScore);
        fetchAIImage();
        return true;
      }
      return false;
    }

    function update() {
      updateAIComments();
      if(gameState==='roundCountdown') {
        const elapsed = Date.now() - countdownStart;
        const _prevCD = countdownValue;
        countdownValue = 3 - Math.floor(elapsed / 1000);
        if(countdownValue !== _prevCD && countdownValue > 0) KA.countdown();
        if(countdownValue <= 0) beginPlaying();
      }
      if(gameState==='playing') {
        const elapsed = Date.now() - playingStart;
        if(elapsed >= PLAY_DURATION) resolveRound();
      }
      if(gameState==='result' && Date.now()-resultShowTime > 2500) {
        if(!checkMatchEnd()) beginRoundCountdown();
      }
    }

    function drawBackground() {
      const g=ctx.createLinearGradient(0,0,0,canvas.height);
      g.addColorStop(0,'#0d0d1a');g.addColorStop(1,'#1a0a2e');
      ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    function drawScoreboard() {
      ctx.fillStyle='#790ECB';ctx.font='bold 32px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.fillText(t('title'),canvas.width/2,50);
      // AWS vs Kiro scoreboard
      ctx.fillStyle='#fff';ctx.font='bold 24px "Segoe UI", sans-serif';
      ctx.fillText(`${t('player')}: ${playerScore}  ⚡  ${t('cpu')}: ${cpuScore}`,canvas.width/2,95);
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='16px "Segoe UI", sans-serif';
      ctx.fillText(`${t('round')} ${Math.min(round,MAX_ROUNDS)} ${t('of')} ${MAX_ROUNDS}`,canvas.width/2,120);
    }

    function draw() {
      drawBackground();
      if(gameState!=='start') drawScoreboard();

      if(gameState==='start') drawStart();
      else if(gameState==='roundCountdown') drawRoundCountdown();
      else if(gameState==='playing') drawPlaying();
      else if(gameState==='result') drawResult();
      else if(gameState==='matchOver') drawMatchOver();

      drawAIComments();

      // Fist-back-to-menu progress bar
      if(fistHoldStart > 0) {
        const prog = Math.min((Date.now()-fistHoldStart)/FIST_BACK_MS, 1);
        const bw = 400, bh = 24, bx = canvas.width/2-bw/2, by = canvas.height-35;
        ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(bx-4,by-4,bw+8,bh+8,8);ctx.fill();
        ctx.fillStyle='#790ECB';ctx.beginPath();ctx.roundRect(bx,by,bw*prog,bh,6);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI", sans-serif';ctx.textAlign='center';
        ctx.fillText(t('holdBack'),canvas.width/2,by-10);
      }
    }

    function drawStart() {
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#790ECB';ctx.font='bold 44px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.shadowColor='#790ECB';ctx.shadowBlur=20;
      ctx.fillText(t('title'),canvas.width/2,canvas.height/2-100);ctx.shadowBlur=0;

      ctx.fillStyle='#fff';ctx.font='bold 28px "Segoe UI", sans-serif';
      ctx.fillText(`${t('player')} vs ${t('cpu')}`,canvas.width/2,canvas.height/2-40);

      ctx.fillStyle='#c0c0c0';ctx.font='20px "Segoe UI", sans-serif';
      ctx.fillText(`${MAX_ROUNDS} ${t('round').toLowerCase()}s`,canvas.width/2,canvas.height/2);
      ctx.fillText(t('showGesture'),canvas.width/2,canvas.height/2+40);
      ctx.fillText(t('startHint'),canvas.width/2,canvas.height/2+75);

      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='16px "Segoe UI", sans-serif';
      ctx.fillText(t('guide'),canvas.width/2,canvas.height/2+130);

      // Ranking on start
      const ranking = loadRanking();
      if(ranking.length > 0) {
        ctx.fillStyle='#790ECB';ctx.font='bold 20px "Segoe UI", sans-serif';
        ctx.fillText(t('ranking'),canvas.width/2,canvas.height/2+180);
        for(let i=0;i<ranking.length;i++){
          const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'  ';
          ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='15px "Segoe UI", sans-serif';
          ctx.fillText(`${m} #${i+1}  ${ranking[i].score} ${t('winsLabel')} — ${ranking[i].date}`,canvas.width/2,canvas.height/2+210+i*26);
        }
      }
    }

    function drawRoundCountdown() {
      const elapsed = Date.now() - countdownStart;
      const num = 3 - Math.floor(elapsed / 1000);

      // Round info
      ctx.fillStyle='#fff';ctx.font='bold 28px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.fillText(`${t('round')} ${round} ${t('of')} ${MAX_ROUNDS}`,canvas.width/2,200);

      // Score
      ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='22px "Segoe UI", sans-serif';
      ctx.fillText(`${t('player')} ${playerScore} — ${cpuScore} ${t('cpu')}`,canvas.width/2,240);

      // Pulsing countdown number
      const pulse = 1 + 0.15 * Math.sin(elapsed * 0.008);
      ctx.save();ctx.translate(canvas.width/2, canvas.height/2);ctx.scale(pulse,pulse);
      ctx.fillStyle='#790ECB';ctx.font='bold 140px "Segoe UI", sans-serif';
      ctx.shadowColor='#790ECB';ctx.shadowBlur=30;
      ctx.fillText(num > 0 ? num : '🎮', 0, 50);
      ctx.shadowBlur=0;ctx.restore();

      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='20px "Segoe UI", sans-serif';
      ctx.fillText(t('getReady'),canvas.width/2,canvas.height/2+130);

      // Show detected gesture if any
      if(detectedGesture) {
        ctx.fillStyle='#00ff88';ctx.font='bold 24px "Segoe UI", sans-serif';
        ctx.fillText(EMOJIS[detectedGesture] || '❓',canvas.width/2,canvas.height/2+180);
      }
    }

    function drawPlaying() {
      const elapsed = Date.now() - playingStart;
      const remaining = Math.max(0, PLAY_DURATION - elapsed);
      const pct = remaining / PLAY_DURATION;

      // Timer bar
      const bw=600,bh=30,bx=canvas.width/2-bw/2,by=160;
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
      const col = pct > 0.3 ? '#790ECB' : (pct > 0.15 ? '#ffdd44' : '#ff4444');
      ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(bx,by,bw*pct,bh,8);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.fillText(Math.ceil(remaining/1000)+'s',canvas.width/2,by+22);

      // Choose text
      ctx.fillStyle='#fff';ctx.font='bold 32px "Segoe UI", sans-serif';
      ctx.fillText(t('chooseNow'),canvas.width/2,270);

      // Player side
      ctx.fillStyle='rgba(121,14,203,0.15)';ctx.beginPath();ctx.roundRect(60,320,300,350,16);ctx.fill();
      ctx.fillStyle='#790ECB';ctx.font='bold 24px "Segoe UI", sans-serif';
      ctx.fillText(t('player'),210,370);
      if(detectedGesture) {
        ctx.fillStyle='#fff';ctx.font='100px "Segoe UI", sans-serif';
        ctx.fillText(EMOJIS[detectedGesture],210,510);
        ctx.fillStyle='#00ff88';ctx.font='bold 20px "Segoe UI", sans-serif';
        ctx.fillText(t(detectedGesture+'Label'),210,580);
      } else {
        ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='80px "Segoe UI", sans-serif';
        ctx.fillText('❓',210,510);
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='18px "Segoe UI", sans-serif';
        ctx.fillText(t('showGesture'),210,580);
      }

      // Kiro side (shaking ❓)
      ctx.fillStyle='rgba(121,14,203,0.15)';ctx.beginPath();ctx.roundRect(440,320,300,350,16);ctx.fill();
      ctx.fillStyle='#790ECB';ctx.font='bold 24px "Segoe UI", sans-serif';
      ctx.fillText(t('cpu'),590,370);
      const shake = Math.sin(Date.now()*0.02)*8;
      ctx.save();ctx.translate(shake,0);
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='100px "Segoe UI", sans-serif';
      ctx.fillText('❓',590,510);
      ctx.restore();

      // Gesture guide
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='15px "Segoe UI", sans-serif';
      ctx.fillText(t('guide'),canvas.width/2,720);
    }

    function drawResult() {
      const elapsed = Date.now() - resultShowTime;
      const alpha = Math.min(1, elapsed / 300);

      ctx.globalAlpha = alpha;

      // Player choice
      ctx.fillStyle='rgba(121,14,203,0.2)';ctx.beginPath();ctx.roundRect(60,200,300,400,16);ctx.fill();
      ctx.fillStyle='#790ECB';ctx.font='bold 26px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.fillText(t('player'),210,260);
      ctx.fillStyle='#fff';ctx.font='120px "Segoe UI", sans-serif';
      ctx.fillText(EMOJIS[playerChoice]||'❓',210,420);
      ctx.fillStyle='#c0c0c0';ctx.font='bold 22px "Segoe UI", sans-serif';
      ctx.fillText(t(playerChoice+'Label'),210,500);

      // VS
      ctx.fillStyle='#790ECB';ctx.font='bold 36px "Segoe UI", sans-serif';
      ctx.fillText('VS',canvas.width/2,400);

      // Kiro choice
      ctx.fillStyle='rgba(121,14,203,0.2)';ctx.beginPath();ctx.roundRect(440,200,300,400,16);ctx.fill();
      ctx.fillStyle='#790ECB';ctx.font='bold 26px "Segoe UI", sans-serif';
      ctx.fillText(t('cpu'),590,260);
      ctx.fillStyle='#fff';ctx.font='120px "Segoe UI", sans-serif';
      ctx.fillText(EMOJIS[cpuChoice]||'❓',590,420);
      ctx.fillStyle='#c0c0c0';ctx.font='bold 22px "Segoe UI", sans-serif';
      ctx.fillText(t(cpuChoice+'Label'),590,500);

      // Result text
      const rKey = roundResult==='win'?'win':roundResult==='lose'?'lose':'draw';
      ctx.fillStyle=RESULT_COLORS[roundResult];ctx.font='bold 44px "Segoe UI", sans-serif';
      ctx.shadowColor=RESULT_COLORS[roundResult];ctx.shadowBlur=20;
      ctx.fillText(t(rKey),canvas.width/2,680);ctx.shadowBlur=0;

      // Updated score
      ctx.fillStyle='#fff';ctx.font='bold 24px "Segoe UI", sans-serif';
      ctx.fillText(`${t('player')} ${playerScore} — ${cpuScore} ${t('cpu')}`,canvas.width/2,740);

      ctx.globalAlpha = 1;
    }

    function drawMatchOver() {
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,canvas.width,canvas.height);

      // Match result
      let matchText, matchColor;
      if(playerScore > cpuScore) { matchText=t('matchWin'); matchColor='#00ff88'; }
      else if(cpuScore > playerScore) { matchText=t('matchLose'); matchColor='#ff4444'; }
      else { matchText=t('matchDraw'); matchColor='#ffdd44'; }

      ctx.fillStyle=matchColor;ctx.font='bold 40px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.shadowColor=matchColor;ctx.shadowBlur=25;
      ctx.fillText(matchText,canvas.width/2,180);ctx.shadowBlur=0;

      // Final score
      ctx.fillStyle='#fff';ctx.font='bold 30px "Segoe UI", sans-serif';
      ctx.fillText(`${t('player')} ${playerScore} — ${cpuScore} ${t('cpu')}`,canvas.width/2,240);

      // Ranking
      ctx.fillStyle='#790ECB';ctx.font='bold 22px "Segoe UI", sans-serif';
      ctx.fillText(t('ranking'),canvas.width/2,300);
      if(lastRanking.length===0) {
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='16px "Segoe UI", sans-serif';
        ctx.fillText(t('noScores'),canvas.width/2,335);
      } else {
        for(let i=0;i<lastRanking.length;i++){
          const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'  ';
          const isCurrent = lastRanking[i].score===playerScore && lastRanking[i].date===new Date().toLocaleDateString();
          ctx.fillStyle=isCurrent?'#00ff88':'rgba(255,255,255,0.7)';
          ctx.font=(isCurrent?'bold ':'')+' 16px "Segoe UI", sans-serif';
          ctx.fillText(`${m} #${i+1}  ${lastRanking[i].score} ${t('winsLabel')} — ${lastRanking[i].name || '???'}  ${lastRanking[i].date}`,canvas.width/2,335+i*28);
        }
      }

      // Action buttons (big styled like flappy)
      const actY = 500;
      // Restart button
      ctx.fillStyle='rgba(0,255,136,0.15)';ctx.strokeStyle='#00ff88';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(canvas.width/2-280,actY,560,60,12);ctx.fill();ctx.stroke();
      ctx.fillStyle='#00ff88';ctx.font='bold 24px "Segoe UI", sans-serif';ctx.textAlign='center';
      ctx.fillText(t('playAgain'),canvas.width/2,actY+38);

      // Menu button
      ctx.fillStyle='rgba(255,221,68,0.15)';ctx.strokeStyle='#ffdd44';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(canvas.width/2-280,actY+80,560,60,12);ctx.fill();ctx.stroke();
      ctx.fillStyle='#ffdd44';ctx.font='bold 24px "Segoe UI", sans-serif';
      ctx.fillText(t('fistMenu'),canvas.width/2,actY+80+38);

      // Small keyboard hint
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='15px "Segoe UI", sans-serif';
      ctx.fillText(t('spaceRetry'),canvas.width/2,actY+165);

      // AI Generated Image
      if (aiImageObj && aiImageObj.complete && aiImageObj.naturalWidth > 0) {
        const imgSize = 260;
        const imgX = canvas.width / 2 - imgSize / 2;
        const imgY = actY + 185;
        ctx.shadowColor = '#790ECB';
        ctx.shadowBlur = 20;
        ctx.strokeStyle = '#790ECB';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(imgX - 3, imgY - 3, imgSize + 6, imgSize + 6, 12);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(imgX, imgY, imgSize, imgSize, 10);
        ctx.clip();
        ctx.drawImage(aiImageObj, imgX, imgY, imgSize, imgSize);
        ctx.restore();
        ctx.fillStyle = '#790ECB';
        ctx.font = 'bold 13px "Segoe UI", sans-serif';
        ctx.fillText('🤖 Generated by Nova Canvas', canvas.width / 2, imgY + imgSize + 18);
      } else if (aiImageLoading) {
        ctx.fillStyle = 'rgba(121,14,203,0.6)';
        ctx.font = '15px "Segoe UI", sans-serif';
        ctx.fillText('🎨 ' + (lang === 'es' ? 'Generando imagen con IA...' : 'Generating AI image...'), canvas.width / 2, actY + 195);
      }
    }

    // --- Input handlers ---
    document.addEventListener('keydown', e => {
      if(e.code==='Space') {
        e.preventDefault();
        startMatch();
      }
      if(e.code==='KeyM') KA.toggle();
    });
    canvas.addEventListener('click', e => {
      if(gameState==='start') startMatch();
      if(gameState==='matchOver') {
        const rect=canvas.getBoundingClientRect();
        const scaleY=canvas.height/rect.height;
        const cy=(e.clientY-rect.top)*scaleY;
        const actY=500;
        if(cy>=actY && cy<=actY+60) startMatch();
        if(cy>=actY+80 && cy<=actY+140) goToMenu();
      }
    });

    // --- Game loop ---
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }
    loadRankingFromServer();
    gameLoop();

    // --- Hand detection ---
    const overlayCanvas = document.getElementById('hand-overlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    window._mpHandConnections=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

    function drawHandLandmarks(lm){overlayCanvas.width=overlayCanvas.offsetWidth;overlayCanvas.height=overlayCanvas.offsetHeight;overlayCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);if(!lm||!lm.length)return;const w=overlayCanvas.width,h=overlayCanvas.height;overlayCtx.strokeStyle='#790ECB';overlayCtx.lineWidth=2;for(const c of window._mpHandConnections){const s=lm[c[0]],e=lm[c[1]];if(!s||!e)continue;overlayCtx.beginPath();overlayCtx.moveTo(s.x*w,s.y*h);overlayCtx.lineTo(e.x*w,e.y*h);overlayCtx.stroke();}for(const l of lm){overlayCtx.fillStyle='#00ff88';overlayCtx.beginPath();overlayCtx.arc(l.x*w,l.y*h,3,0,Math.PI*2);overlayCtx.fill();}}

    function classifyGesture(lm) {
      const indexUp = lm[8].y < lm[6].y;
      const middleUp = lm[12].y < lm[10].y;
      const ringUp = lm[16].y < lm[14].y;
      const pinkyUp = lm[20].y < lm[18].y;
      const thumbOut = Math.abs(lm[4].x - lm[2].x) > 0.04;
      let ext = 0;
      if(indexUp) ext++;
      if(middleUp) ext++;
      if(ringUp) ext++;
      if(pinkyUp) ext++;
      if(thumbOut) ext++;
      // Fist = rock (0-1 fingers)
      if(ext <= 1 && !indexUp && !middleUp) return 'rock';
      // 2 fingers (index+middle) = scissors
      if(indexUp && middleUp && !ringUp && !pinkyUp) return 'scissors';
      // Open hand (3+ fingers) = paper
      if(ext >= 3) return 'paper';
      return null;
    }

    function isHandOpen(lm) {
      const fs=[{tip:8,pip:6},{tip:12,pip:10},{tip:16,pip:14},{tip:20,pip:18}];
      let ext=0;for(const f of fs)if(lm[f.tip].y<lm[f.pip].y)ext++;
      const td=Math.abs(lm[4].x-lm[2].x);if(td>0.03)ext++;
      return ext>=3;
    }

    function isFist(lm) {
      const indexUp = lm[8].y < lm[6].y;
      const middleUp = lm[12].y < lm[10].y;
      const ringUp = lm[16].y < lm[14].y;
      const pinkyUp = lm[20].y < lm[18].y;
      const thumbOut = Math.abs(lm[4].x - lm[2].x) > 0.04;
      let ext=0;if(indexUp)ext++;if(middleUp)ext++;if(ringUp)ext++;if(pinkyUp)ext++;if(thumbOut)ext++;
      return ext <= 1 && !indexUp && !middleUp;
    }

    async function initHandDetection(){
      const video=document.getElementById('webcam'),statusEl=document.getElementById('hand-status');
      try{const s=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});video.srcObject=s;await new Promise(r=>{video.onloadedmetadata=r;});await video.play();statusEl.textContent=t('loadingModel');}catch(e){statusEl.textContent=t('noCam');return;}
      let HL,FR;try{const m=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs');HL=m.HandLandmarker;FR=m.FilesetResolver;if(HL.HAND_CONNECTIONS)window._mpHandConnections=HL.HAND_CONNECTIONS.map(c=>[c.start,c.end]);}catch(e){statusEl.textContent=t('moduleFail');return;}
      let vision;try{vision=await FR.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');}catch(e){return;}
      let hl;const url='https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task';
      for(const d of['GPU','CPU']){try{hl=await HL.createFromOptions(vision,{baseOptions:{modelAssetPath:url,delegate:d},runningMode:'VIDEO',numHands:1,minHandDetectionConfidence:0.3,minHandPresenceConfidence:0.3,minTrackingConfidence:0.3});break;}catch(e){hl=null;}}
      if(!hl){statusEl.textContent=t('modelFail');return;}
      statusEl.textContent=t('ready');

      let lt=-1,lastSeen=0,lastLm=null,lastGesture=null;
      function detect(){
        if(video.readyState>=2){const now=performance.now();if(now>lt){lt=now;try{const r=hl.detectForVideo(video,now);
        if(r.landmarks&&r.landmarks.length>0){const lm=r.landmarks[0];lastSeen=Date.now();lastLm=lm;
          const gesture = classifyGesture(lm);
          if(gesture) { detectedGesture=gesture; lastGesture=gesture; }
          const fist = isFist(lm);
          const open = isHandOpen(lm);

          // Fist-back-to-menu (only in start or matchOver)
          if(fist && (gameState==='start'||gameState==='matchOver')){
            if(fistHoldStart===0)fistHoldStart=Date.now();
            else if(Date.now()-fistHoldStart>=FIST_BACK_MS){goToMenu();return;}
          } else if(!fist) { fistHoldStart=0; }

          // Open hand starts match (with cooldown on matchOver)
          if(open && gameState==='start') startMatch();
          if(open && gameState==='matchOver' && Date.now()-matchOverTime>=MATCHOVER_COOLDOWN) startMatch();

          drawHandLandmarks(lm);
          statusEl.textContent = gesture ? (EMOJIS[gesture]+' '+t(gesture+'Label')) : t('showHand');
          statusEl.style.color = gesture ? '#00ff88' : (fistHoldStart>0?'#ffdd44':'#c0c0c0');
        }else{
          const tt=Date.now()-lastSeen;
          if(lastSeen>0&&tt<400){detectedGesture=lastGesture;if(lastLm)drawHandLandmarks(lastLm);}
          else{detectedGesture=null;fistHoldStart=0;overlayCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);statusEl.textContent=t('showHand');statusEl.style.color='#c0c0c0';}
        }}catch(e){}}}
        requestAnimationFrame(detect);
      }
      detect();
    }
    initHandDetection();
  </script>
